<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghid Tehnici de Testare Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/global.css">
</head>

<body class="bg-slate-100 text-slate-800 font-sans min-h-screen relative overflow-x-hidden">

    <div class="flex flex-col md:flex-row min-h-screen relative z-10">
        
        <!-- Left Sidebar Navigation (Layered Light Sidebar) -->
        <aside class="w-full md:w-80 bg-white border-r border-slate-200/80 flex flex-col justify-between p-6 shadow-sm z-30 md:sticky md:top-0 md:h-screen">
            <div>
                <!-- Brand Header -->
                <div class="py-4 border-b border-slate-200/60">
                    <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-700 to-purple-600 bg-clip-text text-transparent flex items-center gap-2">
                        <span>⚡</span> QA Guide
                    </h1>
                    <p class="text-xs text-slate-500 font-semibold mt-1">Ghid Tehnici de Testare Software</p>
                </div>
                
                <!-- Vertical Nav List -->
                <nav class="flex flex-col gap-1.5 mt-8" id="sidebar-nav">
                    <button data-page="home" class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl font-bold text-sm text-slate-500 hover:bg-slate-200/50 hover:text-slate-900 transition-all text-left">
                        <span class="text-lg">🏠</span>
                        <span>Acasă</span>
                    </button>
                    <button data-page="blackbox" class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl font-bold text-sm text-slate-500 hover:bg-slate-200/50 hover:text-slate-900 transition-all text-left">
                        <span class="text-lg">🖥️</span>
                        <span>Black Box</span>
                    </button>
                    <button data-page="whitebox" class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl font-bold text-sm text-slate-500 hover:bg-slate-200/50 hover:text-slate-900 transition-all text-left">
                        <span class="text-lg">🧪</span>
                        <span>White Box</span>
                    </button>
                    <button data-page="experience" class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl font-bold text-sm text-slate-500 hover:bg-slate-200/50 hover:text-slate-900 transition-all text-left">
                        <span class="text-lg">🔍</span>
                        <span>Experiență</span>
                    </button>
                    <button data-page="quiz" class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl font-bold text-sm text-slate-500 hover:bg-slate-200/50 hover:text-slate-900 transition-all text-left">
                        <span class="text-lg">🎯</span>
                        <span>Test de Evaluare</span>
                    </button>
                </nav>
            </div>
            
            <!-- Sidebar Footer -->
            <div class="pt-6 border-t border-slate-200/60 text-xxs text-slate-400 font-medium">
                &copy; 2026 - CarmenSteliana
            </div>
        </aside>

        <!-- Right Main Content Panel -->
        <main class="flex-1 flex flex-col justify-between min-w-0 relative z-10">
            <!-- Dynamic Content Area with Space Balancing and min-height centering -->
            <div id="main-content" class="w-full max-w-5xl mx-auto px-6 py-12 transition-all duration-300 min-h-[calc(100vh-80px)] flex flex-col justify-center">
                <div class="text-center py-20 text-slate-400">
                    <p class="animate-pulse font-medium">Se încarcă capitolul...</p>
                </div>
            </div>
            
            <!-- Global Footer -->
            <footer class="py-6 px-8 text-center text-xs text-slate-400 border-t border-slate-200/80 bg-white">
                Ghid QA EdTech Premium &bull; CarmenSteliana
            </footer>
        </main>

    </div>

    <!-- Main router import -->
    <script type="module" src="js/main.js"></script>

</body>

</html>
