<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Evaluare - Ghid Tehnici de Testare Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen py-8 px-6">

    <!-- Container centralizat -->
    <div class="max-w-4xl mx-auto">
        
        <!-- Buton Întoarcere Cuprins -->
        <div class="mb-8">
            <a href="../index.html" class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold rounded-lg text-sm transition">
                ◀ Înapoi la Cuprins
            </a>
        </div>

        <!-- Conținut dinamic -->
        <main id="main-content">
            <div class="page-content">
                <h1 id="quiz-title" class="text-3xl font-bold mb-6 text-purple-700">Încărcare...</h1>
                <div id="quiz-container" class="space-y-6"></div>
            </div>
        </main>
        
    </div>

    <script type="module">
        import initQuiz from '../js/quiz.js';
        
        async function loadData() {
            try {
                const res = await fetch('../data/quiz.json');
                if (!res.ok) throw new Error('Eroare la încărcarea JSON');
                const data = await res.json();
                initQuiz(data);
            } catch (err) {
                console.error(err);
                document.getElementById('quiz-title').textContent = "Eroare de Încărcare (CORS)";
                document.getElementById('quiz-container').innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-lg text-red-900 shadow-md">
                        <h2 class="text-xl font-bold mb-2">Restricție Browser CORS</h2>
                        <p class="mb-4">Pentru a accesa dinamic fișierele de date JSON, pagina trebuie rulată prin intermediul unui server local.</p>
                        <div class="text-xs bg-red-100 p-3 rounded font-mono">
                            Deschideți directorul în VS Code și rulați cu extensia 'Live Server' sau executați 'npx http-server' în terminal.
                        </div>
                    </div>
                `;
            }
        }
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
